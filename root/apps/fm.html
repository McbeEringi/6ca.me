<!DOCTYPE html>
<html><head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>fmsynth</title>
	<link rel="icon" type="image/png" href="/img/favicon.png">

	<link rel="stylesheet" href="/src/style.css">
	<style>
		canvas{width:100%;}
		button{font-size:large;}
		input[type=range]{width:min(100%,856px);}
		.note{display:grid;grid-template-columns:repeat(12,1fr);grid-template-rows:repeat(2,64px);}
	</style>
</head><body>
<canvas id="c"></canvas><br>
<button id="btn">run/pause</button><br>
<div id="sli"><div>
<script>
(async()=>{

c.width=1024;
c.height=256;

const
actx=new AudioContext(),
fm=(
	await actx.audioWorklet.addModule('fm.js'),
	new AudioWorkletNode(actx,'FMSynth')
),
params=fm.parameters.entries().reduce((a,[i,x])=>(a[i]=x,a),{}),
aly=Object.assign(new AnalyserNode(actx),{
	fftSize:2048,
	maxDecibels:-20,
	minDecibels:-100,
	smoothingTimeConstant:0
}),
alyb=new Uint8Array(aly.frequencyBinCount),

ctx=c.getContext('2d'),
dq=[],
draw=_=>(
	ctx.clearRect(0,0,c.width,c.height),

	aly.getByteFrequencyData(alyb),
	ctx.beginPath(),
	alyb.forEach((x,i,{length:l})=>ctx[i?'lineTo':'moveTo'](c.width*i/l,c.height*(1-x/255))),
	ctx.strokeStyle='#eed',
	ctx.stroke(),

	aly.getByteTimeDomainData(alyb),
	ctx.beginPath(),
	alyb.forEach((x,i,{length:l})=>ctx[i?'lineTo':'moveTo'](c.width*i/l,c.height*x/255)),
	ctx.strokeStyle='#def',
	ctx.stroke(),

	dq.forEach(x=>x?.()),

	requestAnimationFrame(draw)
);
draw();


fm.connect(actx.destination);
fm.connect(aly);

btn.onclick=()=>({running:_=>actx.suspend(),suspended:_=>actx.resume()}[actx.state]||(_=>_))();

Object.entries(params).forEach(([i,x])=>sli.append(
	(e=>(
		e.append(
			`${i}: `,
			((
				e,
				f=_=>(
					_=`${x.value.toFixed(2)}`,
					_==e.textContent||(e.textContent=_)
				)
			)=>(
				dq.push(f),
				f(),
				e
			))(document.createElement('code')),
			document.createElement('br'),
			Object.assign(document.createElement('input'),{
				type:'range',
				step:i=='n'?.5:'any',
				min:x.minValue,
				max:Math.min(x.maxValue,5000),
				value:x.value,
				oninput:e=>x.setTargetAtTime(e.target.value,actx.currentTime+.05,.05)
			})
		),
		e
	))(document.createElement('label')),
	i=='frequency'?(e=>(
	e.classList.add('note'),
		e.append(
			...[...'cCdDefFgGaAb'].map((x,i)=>Object.assign(document.createElement('button'),{
				textContent:x,
				onclick:e=>(
					e=e.target.parentElement.parentElement.querySelector('input[type=range]'),
					e.value=440*2**(
						(i-9)/12
						+Math.floor(Math.log2(e.value/(440*2**(-9/12))))
					),
					e.oninput({target:e})
				)
			})),
			...[...'1234567'].map(x=>Object.assign(document.createElement('button'),{
				textContent:x,
				onclick:e=>(
					e=e.target.parentElement.parentElement.querySelector('input[type=range]'),
					e.value=440*2**(-9/12+(Math.log2(e.value/(440*2**(-9/12)))%1+1)%1+(+x-4)),
					e.oninput({target:e})
				)
			})),
		),
		e
	))(document.createElement('div')):'',
	document.createElement('br')
));
	//n.setValueAtTime(n.value,0),
	//n.linearRampToValueAtTime(e.target.value,actx.currentTime+2)

})();
</script>
</body></html>
